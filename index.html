<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Stocks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- General & Theming --- */
        :root {
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --accent-gradient: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            --success-color: #28a745;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color) url('https://www.transparenttextures.com/patterns/cubes.png');
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* --- Glassmorphism & Neon UI Components --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4), 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6), 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .btn-outline:hover {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        h1, h2, h3 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* --- Header --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-actions button {
            margin-left: 15px;
        }

        /* --- Content Discovery --- */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }
        .search-bar { flex-grow: 1; }
        .filters button, .sort-select {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filters button.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
        }

        /* --- Featured Section --- */
        .featured-section {
            margin-bottom: 40px;
        }
        .featured-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .featured-carousel::-webkit-scrollbar {
             height: 8px;
        }
        .featured-carousel::-webkit-scrollbar-thumb {
            background: var(--accent-gradient);
            border-radius: 10px;
        }
        .featured-item {
            flex: 0 0 300px;
            height: 180px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .featured-item:hover {
            transform: scale(1.05);
        }
        .featured-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .featured-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 15px;
            color: #fff;
        }

        /* --- Item Cards --- */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .item-card {
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--neon-magenta);
        }
        .item-card-logo {
            width: 100%;
            height: 150px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .item-card-content { padding: 15px; }
        .item-card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-card-publisher, .item-card-rating {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .item-card-rating {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stars { color: var(--neon-gold); }
        
        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .status-approved { background: var(--success-color); color: white; }
        .status-pending { background: var(--warning-color); color: #333; }
        .status-rejected { background: #dc3545; color: white; }
        
        .downloads-count {
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-top: 5px;
        }

        /* Share button styles */
        .item-card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .share-btn {
            background: none;
            border: none;
            color: var(--neon-cyan);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .share-btn:hover {
            color: var(--neon-magenta);
            transform: scale(1.2);
        }

        /* --- Modals --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #fff;
        }
        
        #item-details-modal .modal-content { max-width: 900px; }
        .item-details-header { display: flex; gap: 20px; margin-bottom: 20px; }
        .item-details-logo { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; }
        .item-details-info h2 { margin-bottom: 5px; }
        .screenshots-carousel { display: flex; gap: 10px; overflow-x: auto; margin: 20px 0; padding-bottom: 10px; }
        .screenshots-carousel img { height: 150px; border-radius: 8px; }
        .item-play-area {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* --- My Submissions Section --- */
        .my-submissions-section {
            margin-bottom: 40px;
        }
        .submissions-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .submission-item {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .submission-item:last-child { border-bottom: none; }

        /* --- Reviews Section --- */
        .reviews-section h3 { margin-top: 30px; }
        .review-form-stars span { font-size: 2rem; cursor: pointer; color: var(--text-muted); }
        .review-form-stars span.selected, .review-form-stars span:hover { color: var(--neon-gold); }
        .review-card {
            border-top: 1px solid var(--glass-border);
            padding: 15px 0;
        }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .review-author { font-weight: 600; color: #fff; }
        .review-actions button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .review-actions button.liked, .review-actions button.disliked { color: var(--neon-cyan); }
        .review-replies { margin-left: 30px; margin-top: 10px; }
        .reply-card { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 5px; }

        /* --- Toast Notifications --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
        }
        .toast {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            animation: toast-in 0.5s forwards;
        }
        @keyframes toast-in {
            to { opacity: 1; transform: translateY(0); }
        }
        .toast.success { background: linear-gradient(90deg, #1d976c, #93f9b9); }
        .toast.error { background: linear-gradient(90deg, #cb2d3e, #ef473a); }
        .toast.info { background: linear-gradient(90deg, #2193b0, #6dd5ed); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
        }
        .tab-btn.active {
            color: var(--neon-cyan);
            border-bottom: 2px solid var(--neon-cyan);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-header glass-panel">
        <div class="logo">📱 App Stocks</div>
        <div class="header-actions">
            <span id="welcome-message" style="margin-right: 20px;"></span>
            <button id="profile-btn" class="btn btn-outline">Profile</button>
            <button id="submit-btn" class="btn btn-primary">Submit App</button>
            <button id="logout-btn" class="btn btn-outline" style="display: none;">Logout</button>
            <button id="notification-btn" class="btn btn-outline">🔔</button>
        </div>
    </header>

    <main class="container">
        <!-- Tabs Navigation -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="explore">Explore</button>
            <button class="tab-btn" data-tab="my-submissions">My Submissions</button>
        </div>

        <!-- Explore Tab -->
        <div id="explore-tab" class="tab-content active">
            <!-- Featured Section -->
            <section class="featured-section">
                <h2>🔥 Featured</h2>
                <div id="featured-carousel" class="featured-carousel">
                    <!-- Featured items will be injected here -->
                </div>
            </section>

            <!-- Controls -->
            <div class="controls-bar glass-panel">
                <div class="filters">
                    <button data-filter="All" class="active">All</button>
                    <button data-filter="App">Apps</button>
                    <button data-filter="Game">Games</button>
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="newest">Newest First</option>
                    <option value="top-rated">Top Rated</option>
                    <option value="most-downloaded">Most Downloaded</option>
                </select>
                <input type="text" id="search-bar" class="search-bar" placeholder="Search for apps or games...">
            </div>

            <!-- Items Grid -->
            <section>
                <div id="items-grid" class="items-grid">
                    <!-- App/Game cards will be injected here -->
                </div>
            </section>
        </div>

        <!-- My Submissions Tab -->
        <div id="my-submissions-tab" class="tab-content">
            <div class="glass-panel">
                <h2>📝 My Submissions</h2>
                <div id="my-submissions-list" class="submissions-list">
                    <!-- User's submissions will appear here -->
                </div>
            </div>
        </div>
    </main>
    
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Modals -->
    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="modal-close">&times;</span>
            <h2>👤 Your Profile</h2>
            <p>A profile is needed to submit, review, and vote.</p>
            <form id="profile-form">
                <input type="text" id="display-name" placeholder="Display Name" required>
                <input type="email" id="email-address" placeholder="Email Address" required>
                <button type="submit" class="btn btn-primary">Save Profile</button>
            </form>
        </div>
    </div>

    <!-- Submission Modal -->
    <div id="submission-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="modal-close">&times;</span>
            <h2>📤 Submit an App or Game</h2>
            <form id="submission-form">
                <input type="text" id="submission-title" placeholder="Title" required>
                <textarea id="submission-desc" placeholder="Description" rows="4" required></textarea>
                <input type="url" id="submission-logo" placeholder="Logo Image URL" required>
                <input type="text" id="submission-screenshots" placeholder="Screenshots (comma-separated URLs)">
                <select id="submission-type" required>
                    <option value="">Select Type...</option>
                    <option value="App">App</option>
                    <option value="Game">Game</option>
                </select>
                
                <!-- NEW: Version and Size fields -->
                <input type="text" id="submission-version" placeholder="Version (e.g., 1.0.0)" required>
                <div class="form-grid">
                    <input type="number" id="submission-size-mb" placeholder="Size (MB)" step="0.1" required>
                    <select id="submission-size-unit">
                        <option value="MB">MB</option>
                        <option value="GB">GB</option>
                        <option value="KB">KB</option>
                    </select>
                </div>
                
                <select id="submission-content-type" required>
                    <option value="">Select Submission Type...</option>
                    <option value="embed">HTML Embed</option>
                    <option value="link">External Link</option>
                </select>
                <textarea id="submission-embed-code" placeholder="Paste <iframe> or HTML code here" rows="5" style="display:none;"></textarea>
                <input type="url" id="submission-download-link" placeholder="External Download URL" style="display:none;">
                <input type="hidden" id="update-of-id">
                <p class="info-text">ℹ️ To request an update for your published app, go to My Submissions and click "Request Update".</p>
                <button type="submit" class="btn btn-primary">Submit for Review</button>
            </form>
        </div>
    </div>
    
    <!-- Item Details Modal -->
    <div id="item-details-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="modal-close">&times;</span>
            <div id="item-details-content">
                <!-- Details will be injected here -->
            </div>
        </div>
    </div>

    <!-- Update Request Modal -->
    <div id="update-request-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="modal-close">&times;</span>
            <h2>🔄 Request Update</h2>
            <form id="update-request-form">
                <input type="hidden" id="update-item-id">
                <input type="text" id="update-title" placeholder="Title" required>
                <textarea id="update-description" placeholder="Description" rows="4" required></textarea>
                <input type="url" id="update-logo" placeholder="Logo Image URL" required>
                <input type="text" id="update-screenshots" placeholder="Screenshots (comma-separated URLs)">
                <select id="update-type" required>
                    <option value="">Select Type...</option>
                    <option value="App">App</option>
                    <option value="Game">Game</option>
                </select>
                <input type="text" id="update-version" placeholder="New Version" required>
                <div class="form-grid">
                    <input type="number" id="update-size-mb" placeholder="Size (MB)" step="0.1" required>
                    <select id="update-size-unit">
                        <option value="MB">MB</option>
                        <option value="GB">GB</option>
                        <option value="KB">KB</option>
                    </select>
                </div>
                <select id="update-content-type" required>
                    <option value="embed">HTML Embed</option>
                    <option value="link">External Link</option>
                </select>
                <textarea id="update-embed-code" placeholder="HTML Embed Code" rows="5" style="display:none;"></textarea>
                <input type="url" id="update-download-link" placeholder="Download URL" style="display:none;">
                <button type="submit" class="btn btn-primary">Submit Update Request</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyCyeCIbVLKxlG8ZnD7Pgd0396IMpAPGpqE",
        authDomain: "app-store-stocks.firebaseapp.com",
        databaseURL: "https://app-store-stocks-default-rtdb.firebaseio.com",
        projectId: "app-store-stocks",
        storageBucket: "app-store-stocks.firebasestorage.app",
        messagingSenderId: "1066420357396",
        appId: "1:1066420357396:web:99348a13f243bfb5601a01"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- GLOBAL STATE & DOM ELEMENTS ---
    let userProfile = null;
    let allItems = {};
    let userSubmissions = {};
    let currentFilter = 'All';
    let currentSort = 'newest';
    let currentSearch = '';

    const DOM = {
        welcomeMessage: document.getElementById('welcome-message'),
        profileBtn: document.getElementById('profile-btn'),
        submitBtn: document.getElementById('submit-btn'),
        logoutBtn: document.getElementById('logout-btn'),
        itemsGrid: document.getElementById('items-grid'),
        featuredCarousel: document.getElementById('featured-carousel'),
        filterButtons: document.querySelectorAll('.filters button'),
        sortSelect: document.getElementById('sort-select'),
        searchBar: document.getElementById('search-bar'),
        profileModal: document.getElementById('profile-modal'),
        submissionModal: document.getElementById('submission-modal'),
        itemDetailsModal: document.getElementById('item-details-modal'),
        updateRequestModal: document.getElementById('update-request-modal'),
        mySubmissionsList: document.getElementById('my-submissions-list'),
        tabBtns: document.querySelectorAll('.tab-btn'),
        tabContents: document.querySelectorAll('.tab-content')
    };
    
    // --- UTILITY FUNCTIONS ---
    const sanitizeEmail = (email) => email.replace(/[.#$[\]]/g, "_");
    
    const formatFileSize = (sizeMB, unit) => {
        if (unit === 'GB') return `${sizeMB} GB`;
        if (unit === 'KB') return `${sizeMB} KB`;
        return `${sizeMB} MB`;
    };

    const showToast = (message, type = 'success') => {
        const toastContainer = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        toastContainer.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    };

    // --- PROFILE MANAGEMENT ---
    function checkUserProfile() {
        const profile = localStorage.getItem('userProfile');
        if (profile) {
            userProfile = JSON.parse(profile);
            DOM.welcomeMessage.textContent = `Welcome, ${userProfile.displayName}!`;
            DOM.profileBtn.style.display = 'none';
            DOM.logoutBtn.style.display = 'inline-block';
            loadUserSubmissions();
            listenForNotifications();
        } else {
            DOM.welcomeMessage.textContent = '';
            DOM.profileBtn.style.display = 'inline-block';
            DOM.logoutBtn.style.display = 'none';
        }
    }

    function saveProfile(e) {
        e.preventDefault();
        const displayName = document.getElementById('display-name').value;
        const email = document.getElementById('email-address').value;
        if (displayName && email) {
            userProfile = { displayName, email };
            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            checkUserProfile();
            DOM.profileModal.classList.remove('active');
            showToast('Profile saved successfully!');
        }
    }

    function logout() {
        localStorage.removeItem('userProfile');
        userProfile = null;
        checkUserProfile();
        showToast('You have been logged out.');
    }

    // Load user's submissions from pendingSubmissions and published items
    function loadUserSubmissions() {
        if (!userProfile) return;
        
        const sanitizedEmail = sanitizeEmail(userProfile.email);
        userSubmissions = {};
        
        // Load pending submissions
        database.ref('pendingSubmissions').orderByChild('submitterEmail').equalTo(userProfile.email).on('value', (snapshot) => {
            snapshot.forEach(child => {
                userSubmissions[child.key] = {
                    id: child.key,
                    ...child.val(),
                    status: 'pending'
                };
            });
            renderUserSubmissions();
        });
        
        // Load published items by this user
        database.ref('items').orderByChild('publisherEmail').equalTo(userProfile.email).on('value', (snapshot) => {
            snapshot.forEach(child => {
                if (userSubmissions[child.key]) {
                    userSubmissions[child.key].status = 'approved';
                    userSubmissions[child.key].publishedData = child.val();
                } else {
                    userSubmissions[child.key] = {
                        id: child.key,
                        ...child.val(),
                        status: 'approved',
                        publishedData: child.val()
                    };
                }
            });
            renderUserSubmissions();
        });
    }

    function renderUserSubmissions() {
        if (!DOM.mySubmissionsList) return;
        
        DOM.mySubmissionsList.innerHTML = '';
        const submissionsArray = Object.values(userSubmissions);
        
        if (submissionsArray.length === 0) {
            DOM.mySubmissionsList.innerHTML = '<p style="padding: 15px; text-align: center;">No submissions yet. Click "Submit App" to get started!</p>';
            return;
        }
        
        submissionsArray.forEach(sub => {
            const statusClass = sub.status === 'approved' ? 'status-approved' : (sub.status === 'rejected' ? 'status-rejected' : 'status-pending');
            const statusText = sub.status === 'approved' ? '✓ Approved' : (sub.status === 'rejected' ? '✗ Rejected' : '⏳ Pending Review');
            
            const subDiv = document.createElement('div');
            subDiv.className = 'submission-item';
            subDiv.innerHTML = `
                <div class="info">
                    <strong>${sub.title}</strong><br>
                    <small>Type: ${sub.type} | Version: ${sub.version || 'N/A'}</small><br>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    ${sub.status === 'approved' && sub.publishedData ? `<div class="downloads-count">📥 Downloads: ${sub.publishedData.downloads || 0}</div>` : ''}
                </div>
                <div class="actions">
                    ${sub.status === 'approved' ? `<button class="btn btn-sm btn-outline request-update-btn" data-id="${sub.id}" data-title="${sub.title}" data-desc="${sub.description}" data-logo="${sub.logoUrl}" data-screenshots="${(sub.screenshots || []).join(',')}" data-type="${sub.type}" data-version="${sub.version || ''}" data-size-mb="${sub.sizeMB || ''}" data-size-unit="${sub.sizeUnit || 'MB'}" data-submission-type="${sub.submissionType}" data-embed-code="${sub.embedCode || ''}" data-download-link="${sub.downloadLink || ''}">🔄 Request Update</button>` : ''}
                    ${sub.status === 'pending' ? `<button class="btn btn-sm btn-danger cancel-submission-btn" data-id="${sub.id}">❌ Cancel</button>` : ''}
                </div>
            `;
            DOM.mySubmissionsList.appendChild(subDiv);
        });
        
        // Add event listeners for update request buttons
        document.querySelectorAll('.request-update-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openUpdateRequestModal({
                    id: btn.dataset.id,
                    title: btn.dataset.title,
                    description: btn.dataset.desc,
                    logoUrl: btn.dataset.logo,
                    screenshots: btn.dataset.screenshots,
                    type: btn.dataset.type,
                    version: btn.dataset.version,
                    sizeMB: btn.dataset.sizeMb,
                    sizeUnit: btn.dataset.sizeUnit,
                    submissionType: btn.dataset.submissionType,
                    embedCode: btn.dataset.embedCode,
                    downloadLink: btn.dataset.downloadLink
                });
            });
        });
        
        // Add event listeners for cancel buttons
        document.querySelectorAll('.cancel-submission-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('Are you sure you want to cancel this submission?')) {
                    database.ref(`pendingSubmissions/${btn.dataset.id}`).remove();
                    showToast('Submission cancelled');
                }
            });

    // --- NOTIFICATIONS ---
    function listenForNotifications() {
        if (!userProfile) return;
        const sanitizedEmail = sanitizeEmail(userProfile.email);
        const notificationsRef = database.ref(`notifications/${sanitizedEmail}`);

        notificationsRef.on('child_added', (snapshot) => {
            const notification = snapshot.val();
            if (!notification.seen) {
                const message = notification.message || `Your submission "${notification.title}" was ${notification.status}.`;
                showToast(message, notification.status === 'approved' ? 'success' : 'error');
                notificationsRef.child(snapshot.key).update({ seen: true });
                loadUserSubmissions(); // Refresh submissions list
            }
        });
    }

    // Track download clicks
    function trackDownload(itemId) {
        if (!itemId) return;
        
        const itemRef = database.ref(`items/${itemId}`);
        itemRef.transaction(item => {
            if (item) {
                item.downloads = (item.downloads || 0) + 1;
            }
            return item;
        });
        
        showToast('Download started!', 'info');
    }

    // --- CONTENT RENDERING ---
    function renderItems() {
        DOM.itemsGrid.innerHTML = '';
        DOM.featuredCarousel.innerHTML = '';
        
        let itemsArray = Object.keys(allItems).map(key => ({ id: key, ...allItems[key] }));

        // 1. Filter
        if (currentFilter !== 'All') {
            itemsArray = itemsArray.filter(item => item.type === currentFilter);
        }

        // 2. Search
        if (currentSearch) {
            itemsArray = itemsArray.filter(item => 
                item.title.toLowerCase().includes(currentSearch) ||
                item.description.toLowerCase().includes(currentSearch)
            );
        }

        // 3. Sort
        itemsArray.sort((a, b) => {
            if (currentSort === 'newest') {
                return b.publishedAt - a.publishedAt;
            } else if (currentSort === 'top-rated') {
                return (b.avgRating || 0) - (a.avgRating || 0);
            } else if (currentSort === 'most-downloaded') {
                return (b.downloads || 0) - (a.downloads || 0);
            }
            return 0;
        });
        
        // Render Featured Carousel
        Object.values(allItems).filter(item => item.isFeatured).forEach(item => {
             const featuredDiv = document.createElement('div');
             featuredDiv.className = 'featured-item';
             const itemId = Object.keys(allItems).find(key => allItems[key] === item);
             featuredDiv.dataset.id = itemId;
             featuredDiv.innerHTML = `
                <img src="${item.logoUrl}" alt="${item.title}">
                <div class="overlay"><h3>${item.title}</h3></div>
             `;
             featuredDiv.addEventListener('click', () => showItemDetails(itemId));
             DOM.featuredCarousel.appendChild(featuredDiv);
        });

        // Render Grid
        itemsArray.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card glass-panel';
            card.dataset.id = item.id;
            const avgRating = item.avgRating ? item.avgRating.toFixed(1) : 'N/A';
            const totalRatings = item.totalRatings || 0;
            const downloads = item.downloads || 0;
            const sizeText = item.sizeMB ? formatFileSize(item.sizeMB, item.sizeUnit || 'MB') : 'Size N/A';
            
            card.innerHTML = `
                <div class="item-card-logo" style="background-image: url('${item.logoUrl}')"></div>
                <div class="item-card-content">
                    <h3 class="item-card-title">${item.title}</h3>
                    <p class="item-card-publisher">by ${item.publisherName}</p>
                    <div class="item-card-rating">
                        <span class="stars">★★★★★</span>
                        <span>${avgRating} (${totalRatings} ratings)</span>
                    </div>
                    <div class="downloads-count">📥 ${downloads} downloads | 💾 ${sizeText}</div>
                    <div class="item-card-actions">
                        <button class="share-btn" data-id="${item.id}" title="Share this app">🔗</button>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', (e) => {
                if (!e.target.classList.contains('share-btn')) {
                    showItemDetails(item.id);
                }
            });
            
            const shareBtn = card.querySelector('.share-btn');
            shareBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                shareItem(item.id);
            });
            
            DOM.itemsGrid.appendChild(card);
        });
    }

    function loadItems() {
        database.ref('items').on('value', (snapshot) => {
            allItems = snapshot.val() || {};
            renderItems();
        });
    }

    // --- SHARE FUNCTIONALITY ---
    function shareItem(itemId) {
        const baseUrl = window.location.origin + window.location.pathname;
        const shareableUrl = `${baseUrl}?item=${itemId}`;
        
        navigator.clipboard.writeText(shareableUrl).then(() => {
            showToast('Link copied to clipboard!');
        }).catch(err => {
            const textArea = document.createElement('textarea');
            textArea.value = shareableUrl;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast('Link copied to clipboard!');
        });
    }

                    <div class="item-card-rating">
                        <span class="stars">★★★★★</span>
                        <span>${(item.avgRating || 0).toFixed(1)} (${item.totalRatings || 0} ratings)</span>
                    </div>
                    <div class="downloads-count">📥 Total Downloads: ${item.downloads || 0}</div>

            </div>
            <p>${item.description}</p>

                <div id="reviews-list"></div>
            </div>
        `;
        
        // Action buttons
        const actionContainer = detailsContent.querySelector('#action-buttons-container');
        if (item.submissionType === 'embed') {

            actionContainer.querySelector('#play-btn').onclick = () => {
                detailsContent.querySelector('#play-area-container').innerHTML = `<iframe class="item-play-area" srcdoc="${item.embedCode.replace(/"/g, '&quot;')}"></iframe>`;
            };
        } else {

    // --- REVIEW SYSTEM ---
    function renderReviewForm(itemId) {
        const container = document.getElementById('review-form-container');
        if (!container) return;
        
        if (!userProfile) {
            container.innerHTML = '<p>⭐ You must have a profile to leave a review.</p>';
            return;
        }

        container.innerHTML = `
            <form id="review-form" class="glass-panel" style="margin-bottom:20px;">
                <h4>Leave a Review</h4>
                <div class="review-form-stars" data-rating="0">
                    <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
                </div>
                <textarea id="review-comment" placeholder="Optional comment..." rows="3"></textarea>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </form>
        `;

        const stars = container.querySelectorAll('.review-form-stars span');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.dataset.value;
                container.querySelector('.review-form-stars').dataset.rating = rating;
                stars.forEach(s => s.classList.toggle('selected', s.dataset.value <= rating));
            });
        });

        document.getElementById('review-form').addEventListener('submit', (e) => submitReview(e, itemId));
    }
    
    function submitReview(e, itemId) {
        e.preventDefault();
        const rating = parseInt(document.querySelector('.review-form-stars').dataset.rating);
        const comment = document.getElementById('review-comment').value;

        if (rating === 0) {
            showToast('Please select a star rating.', 'error');
            return;
        }
        
        const reviewData = {
            userId: sanitizeEmail(userProfile.email),
            username: userProfile.displayName,
            rating,
            comment,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            likes: 0,
            dislikes: 0
        };

        const reviewRef = database.ref(`reviews/${itemId}`).push();
        const itemRef = database.ref(`items/${itemId}`);

        database.ref(`reviews/${itemId}`).orderByChild('userId').equalTo(reviewData.userId).once('value', snapshot => {
            if (snapshot.exists()) {
                showToast('You have already reviewed this item.', 'error');
                return;
            }
            
            reviewRef.set(reviewData);
            itemRef.transaction(item => {
                if (item) {
                    item.totalRatings = (item.totalRatings || 0) + 1;
                    item.sumOfRatings = (item.sumOfRatings || 0) + rating;
                    item.avgRating = item.sumOfRatings / item.totalRatings;
                }
                return item;
            });

            showToast('Review submitted!');
            document.getElementById('review-form').reset();
            document.querySelectorAll('.review-form-stars span').forEach(s => s.classList.remove('selected'));
        });
    }

    function loadAndRenderReviews(itemId) {
        const reviewsList = document.getElementById('reviews-list');
        if (!reviewsList) return;
        
        database.ref(`reviews/${itemId}`).on('value', snapshot => {
            reviewsList.innerHTML = '';
            if (!snapshot.exists()) {
                reviewsList.innerHTML = '<p>No reviews yet. Be the first to review!</p>';
                return;
            }
            snapshot.forEach(childSnapshot => {
                const reviewId = childSnapshot.key;
                const review = childSnapshot.val();
                
                const reviewCard = document.createElement('div');
                reviewCard.className = 'review-card';
                reviewCard.innerHTML = `
                    <div class="review-header">
                        <div>
                            <span class="review-author">${review.username}</span> - <span class="stars">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span>
                        </div>
                        <div class="review-actions">
                            <button class="vote-btn" data-type="like" data-item="${itemId}" data-review="${reviewId}">👍 ${review.likes}</button>
                            <button class="vote-btn" data-type="dislike" data-item="${itemId}" data-review="${reviewId}">👎 ${review.dislikes}</button>
                            <button class="reply-btn">💬 Reply</button>
                            ${userProfile && sanitizeEmail(userProfile.email) === review.userId ? `<button class="delete-review-btn" data-item="${itemId}" data-review="${reviewId}" data-rating="${review.rating}">🗑 Delete</button>` : ''}
                        </div>
                    </div>
                    <p class="review-comment">${review.comment || ''}</p>
                    <div class="review-replies"></div>
                    <div class="reply-form" style="display:none; margin-left:30px; margin-top:10px;">
                        <textarea placeholder="Write a reply..." rows="2"></textarea>
                        <button class="btn btn-primary btn-sm submit-reply-btn" data-item="${itemId}" data-review="${reviewId}">Post Reply</button>
                    </div>
                `;
                reviewsList.appendChild(reviewCard);

                if(review.replies) {
                    const repliesContainer = reviewCard.querySelector('.review-replies');
                    Object.values(review.replies).forEach(reply => {
                        repliesContainer.innerHTML += `
                          <div class="reply-card">
                            <strong>${reply.username}:</strong> ${reply.text}
                          </div>
                        `;
                    });
                }
            });
        });
    }

    function handleReviewInteraction(e) {
        const target = e.target;
        if(target.classList.contains('vote-btn')) {
             voteOnReview(target.dataset.item, target.dataset.review, target.dataset.type);
        }
        if (target.classList.contains('delete-review-btn')) {
            deleteReview(target.dataset.item, target.dataset.review, parseInt(target.dataset.rating));
        }
        if (target.classList.contains('reply-btn')) {
            target.closest('.review-card').querySelector('.reply-form').style.display = 'block';
        }
        if (target.classList.contains('submit-reply-btn')) {
            const replyText = target.previousElementSibling.value;
            postReply(target.dataset.item, target.dataset.review, replyText);
        }
    }

    function voteOnReview(itemId, reviewId, voteType) {
        if (!userProfile) { showToast('You need a profile to vote.', 'error'); return; }

        const voteRecord = JSON.parse(localStorage.getItem('reviewVotes')) || {};
        if (voteRecord[reviewId]) {
            showToast('You have already voted on this review.', 'error');
            return;
        }

        const reviewRef = database.ref(`reviews/${itemId}/${reviewId}`);
        reviewRef.child(voteType + 's').set(firebase.database.ServerValue.increment(1));
        
        voteRecord[reviewId] = voteType;
        localStorage.setItem('reviewVotes', JSON.stringify(voteRecord));
        showToast('Vote counted!');
    }
    
    function deleteReview(itemId, reviewId, rating) {
        if (!confirm('Are you sure you want to delete your review?')) return;

        database.ref(`reviews/${itemId}/${reviewId}`).remove();
        database.ref(`items/${itemId}`).transaction(item => {
            if (item) {
                item.totalRatings = (item.totalRatings || 1) - 1;
                item.sumOfRatings = (item.sumOfRatings || rating) - rating;
                item.avgRating = item.totalRatings > 0 ? item.sumOfRatings / item.totalRatings : 0;
            }
            return item;
        });
        showToast('Review deleted.');
    }

    function postReply(itemId, reviewId, text) {
         if (!userProfile) { showToast('You need a profile to reply.', 'error'); return; }
         if (!text.trim()) return;

         const replyData = {
             userId: sanitizeEmail(userProfile.email),
             username: userProfile.displayName,
             text,
             timestamp: firebase.database.ServerValue.TIMESTAMP
         };
         database.ref(`reviews/${itemId}/${reviewId}/replies`).push(replyData);
         // Clear and hide form
         const replyForm = document.querySelector(`.reply-form`);
         if (replyForm) {
             replyForm.style.display = 'none';
             replyForm.querySelector('textarea').value = '';
         }
         showToast('Reply posted!');
    }

    // --- TABS NAVIGATION ---
    function setupTabs() {
        DOM.tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                
                DOM.tabBtns.forEach(b => b.classList.remove('active'));
                DOM.tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`${tabId}-tab`).classList.add('active');
                
                if (tabId === 'my-submissions') {
                    loadUserSubmissions();
                }
            });
        });
    }

    // --- EVENT LISTENERS ---
    window.addEventListener('DOMContentLoaded', () => {
        checkUserProfile();
        loadItems();
        setupSubmissionTypeToggle();
        setupTabs();
        
        // Check for direct item link in URL
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('item');
        if (itemId) {
            database.ref('items').once('value', (snapshot) => {
                allItems = snapshot.val() || {};
                if (allItems[itemId]) {
                    setTimeout(() => showItemDetails(itemId), 500);
                } else {
                    showToast('App not found', 'error');
                }
            });
        }
        
        // Modal controls
        DOM.profileBtn.addEventListener('click', () => DOM.profileModal.classList.add('active'));
        DOM.submitBtn.addEventListener('click', openSubmissionForm);
        DOM.logoutBtn.addEventListener('click', logout);
        
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.closest('.modal').classList.remove('active');
            });
        });

        // Forms
        document.getElementById('profile-form').addEventListener('submit', saveProfile);
        document.getElementById('submission-form').addEventListener('submit', handleSubmission);

        // Filtering and Sorting
        DOM.filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                DOM.filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentFilter = button.dataset.filter;
                renderItems();
            });
        });
        DOM.sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderItems();
        });
        DOM.searchBar.addEventListener('keyup', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderItems();
        });

        // Notification button
        document.getElementById('notification-btn').addEventListener('click', () => {
            showToast('Check "My Submissions" for status updates!', 'info');
        });

        // Event delegation for dynamic content
        document.body.addEventListener('click', handleReviewInteraction);
    });

    </script>
</body>
</html>
